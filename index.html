<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Tasks JSON 轉 CSV 匯出工具</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="apple-touch-icon" href="assets/favicon/favicon.png">
    <link rel="icon" type="image/png" href="assets/favicon/favicon.png">
    <meta name="msapplication-TileColor" content="#f8fafc">
    <meta name="msapplication-TileImage" content="assets/favicon/favicon.png">
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- 引入 Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-6">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-900 flex items-center justify-center gap-3">
                <i class="ph-fill ph-check-square-offset text-blue-500"></i>
                Tasks JSON 轉 CSV 匯出工具
            </h1>
            <p class="text-slate-600 mt-2">將 Google Tasks 的匯出檔依照「清單名稱」與「狀態」拆分為獨立的 CSV 檔案</p>
        </header>

        <!-- Main Card -->
        <main class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            
            <!-- Upload Area -->
            <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-xl p-10 text-center transition-colors duration-200 ease-in-out cursor-pointer hover:bg-slate-50">
                <input type="file" id="fileInput" accept=".json" class="hidden">
                <i class="ph ph-upload-simple text-4xl text-blue-500 mb-3"></i>
                <h3 class="text-lg font-semibold text-slate-700 mb-1">點擊或拖曳 JSON 檔案至此處</h3>
                <p class="text-sm text-slate-500">支援 Google Takeout 匯出的 Tasks.json</p>
            </div>

            <!-- Message Area -->
            <div id="messageArea" class="hidden mt-4 p-4 rounded-lg text-sm flex items-start gap-3">
                <i id="messageIcon" class="ph text-xl mt-0.5"></i>
                <span id="messageText" class="leading-relaxed"></span>
            </div>

            <!-- Results Area -->
            <div id="resultArea" class="hidden mt-8 pt-8 border-t border-slate-100">
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i class="ph-fill ph-files text-blue-500"></i>
                        產生的檔案列表
                    </h2>
                    <button id="downloadZipBtn" class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors shadow-sm">
                        <i class="ph-bold ph-file-zip text-lg"></i>
                        全部打包下載 (ZIP)
                    </button>
                </div>

                <ul id="fileList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- File items will be injected here -->
                </ul>
            </div>
        </main>
    </div>

    <script src="scripts/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
